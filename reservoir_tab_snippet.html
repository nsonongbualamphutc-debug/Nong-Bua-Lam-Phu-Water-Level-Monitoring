<!--
  ============================================================
  วิธีใช้: แทนที่ content ในแท็บ "🏞️ อ่างเก็บน้ำ" ของ input.html เดิม
  
  ขั้นตอน:
  1. เปิดไฟล์ input.html บน GitHub
  2. หาส่วน <div id="tab-reservoir"> หรือ section ของแท็บอ่างเก็บน้ำ
  3. แทนที่ content ข้างในด้วย HTML ด้านล่างนี้
  4. เพิ่ม CSS และ JS ที่ระบุ
  
  แท็บอื่น (ระดับน้ำ / ฝน / รายงาน ฯลฯ) ไม่มีผลกระทบอะไรทั้งนั้น
  ============================================================
-->

<!-- =============================================
  HTML: แทนที่ content ข้างใน section อ่างเก็บน้ำ
  ============================================= -->
<div class="res-input-wrap">

  <!-- วันที่ + ผู้บันทึก (อยู่บนสุด ใช้ร่วมกันทุกอ่าง) -->
  <div class="ri-meta">
    <div class="ri-meta-row">
      <div class="ri-meta-item">
        <label class="ri-label">วันที่สำรวจ <span class="req">*</span></label>
        <input type="date" id="riDate" class="ri-input-date"/>
      </div>
      <div class="ri-meta-item">
        <label class="ri-label">ผู้บันทึก <span class="req">*</span></label>
        <input type="text" id="riRecorder" class="ri-input-text" placeholder="ชื่อ-สกุล"/>
      </div>
      <div class="ri-meta-stat">
        <div class="ri-stat-box">
          <div class="ri-stat-num" id="riFilledCount">0</div>
          <div class="ri-stat-lbl">จาก 14 อ่าง</div>
        </div>
        <div class="ri-stat-box">
          <div class="ri-stat-num" id="riAvgPct">—</div>
          <div class="ri-stat-lbl">% เฉลี่ย</div>
        </div>
      </div>
    </div>
    <!-- progress bar -->
    <div class="ri-progress-outer">
      <div class="ri-progress-fill" id="riProgress" style="width:0%"></div>
    </div>
    <div class="ri-progress-hint">
      กรอกช่อง <strong style="color:#0891b2">ปริมาณน้ำ (Mm³)</strong> — ระบบคำนวณ % อัตโนมัติ
    </div>
  </div>

  <!-- ตารางกรอก -->
  <div class="ri-table-scroll">
    <table class="ri-table" id="riTable">
      <thead>
        <tr>
          <th style="width:38px">#</th>
          <th>ชื่ออ่างเก็บน้ำ</th>
          <th style="text-align:right">ความจุ (Mm³)</th>
          <th style="width:160px">ปริมาณน้ำ (Mm³) ↓</th>
          <th style="width:120px">% เก็บกัก</th>
          <th style="width:90px">สถานะ</th>
        </tr>
      </thead>
      <tbody id="riTableBody">
        <!-- generated by JS below -->
      </tbody>
    </table>
  </div>

  <!-- ปุ่ม -->
  <div class="ri-actions">
    <button type="button" class="ri-btn-clear" onclick="riClear()">🗑️ ล้างทั้งหมด</button>
    <div class="ri-toast" id="riToast" style="display:none"></div>
    <button type="button" class="ri-btn-save" id="riBtnSave" onclick="riSave()">
      💾 บันทึกข้อมูลอ่างเก็บน้ำ
    </button>
  </div>

</div>


<!-- =============================================
  CSS: เพิ่มใน <style> ของ input.html เดิม
  (วางก่อน </style> ท้ายสุด)
  ============================================= -->

  font-family: inherit; font-size: 13px; color: #0f172a; background: #fff; outline: none;
}

.ri-progress-hint { font-size: 11px; color: #64748b; }

.ri-table-scroll { overflow-x: auto; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 14px; }
.ri-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.ri-td-pct { padding: 9px 12px; }
.ri-pct-row { display: flex; align-items: center; gap: 7px; }

/* group row */
.ri-table .ri-group-row td {
  background: linear-gradient(90deg, #083344, #155e75);
  color: #a5f3fc; font-size: 11px; font-weight: 700;
  padding: 5px 14px; letter-spacing: .4px;
}

.ri-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.ri-btn-clear { padding: 10px 18px; background: transparent; border: 1.5px solid #e2e8f0; border-radius: 9px; font-family: inherit; font-size: 13px; font-weight: 600; color: #64748b; cursor: pointer; transition: all .15s; }
.ri-btn-clear:hover { border-color: #dc2626; color: #dc2626; }

.ri-btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(8,145,178,.4); }

.ri-toast.ok  { background: #dcfce7; color: #15803d; }

<!-- =============================================
  JAVASCRIPT: เพิ่มใน <script> ของ input.html เดิม
  (วางก่อน </script> ท้ายสุด — ใช้ตัวแปร API_URL เดิมได้เลย)
  ============================================= -->
<script id="ri-js-to-add">
/* ===== Reservoir Input — 14 อ่างจาก XLS จริง ===== */
(function(){
  const RESERVOIRS = [
    // อ.เมืองหนองบัวลำภู
    {id:"R01",no:1, name:"ห้วยยางเงาะ",       village:"ถ้ำกลองเพล",    amphoe:"เมือง",        capacity:0.400},
    {id:"R03",no:3, name:"ห้วยเหล่ายาง",       village:"ภูพานทอง",      amphoe:"เมือง",        capacity:2.469},
    // อ.ศรีบุญเรือง
    {id:"R02",no:2, name:"ห้วยซับม่วง",        village:"หนองกุงแก้ว",   amphoe:"ศรีบุญเรือง",  capacity:0.750},
    // อ.โนนสัง
    {id:"R04",no:4, name:"อ่างน้ำบอง",         village:"ตาดไฮ",         amphoe:"โนนสัง",       capacity:20.800},
    // อ.นากลาง
    {id:"R05",no:5, name:"ห้วยสนามชัย",        village:"สนามชัย",       amphoe:"นากลาง",       capacity:0.330},
    {id:"R09",no:9, name:"ห้วยไร่ 1",          village:"โนนธาตุพัฒนา",  amphoe:"นากลาง",       capacity:0.200},
    {id:"R10",no:10,name:"ห้วยไร่ 2",          village:"สระแก้ว",       amphoe:"นากลาง",       capacity:0.695},
    {id:"R11",no:11,name:"ห้วยลำใย",           village:"เกษมมณี",       amphoe:"นากลาง",       capacity:0.450},
    {id:"R12",no:12,name:"ห้วยโป่งซาง",        village:"ป่าแดงงาม",     amphoe:"นากลาง",       capacity:0.300},
    // อ.นาวัง
    {id:"R06",no:6, name:"ผาวัง",              village:"โคกนาเหล่า",    amphoe:"นาวัง",        capacity:2.122},
    {id:"R07",no:7, name:"ห้วยลาดกั่ว",        village:"นาแก",          amphoe:"นาวัง",        capacity:0.842},
    {id:"R14",no:14,name:"ผาจ้ำน้ำ",           village:"ภูเขาวง",       amphoe:"นาวัง",        capacity:0.085},
    // อ.สุวรรณคูหา
    {id:"R08",no:8, name:"ห้วยโซ่",            village:"โคกนกพัฒนา",    amphoe:"สุวรรณคูหา",   capacity:1.430},
    {id:"R13",no:13,name:"ห้วยบ้านคลองเจริญ",  village:"คลองเจริญ",     amphoe:"สุวรรณคูหา",   capacity:0.623},
  ];

  const GROUPS = [
    {amphoe:"เมืองหนองบัวลำภู", ids:["R01","R03"]},
    {amphoe:"ศรีบุญเรือง",       ids:["R02"]},
    {amphoe:"โนนสัง",            ids:["R04"]},
    {amphoe:"นากลาง",            ids:["R05","R09","R10","R11","R12"]},
    {amphoe:"นาวัง",             ids:["R06","R07","R14"]},
    {amphoe:"สุวรรณคูหา",        ids:["R08","R13"]},
  ];

  const vals = {}; // { id: volume }

  /* Build table */
  function buildTable() {
    const tbody = document.getElementById("riTableBody");
    if(!tbody) return;
    tbody.innerHTML = "";
    GROUPS.forEach(g => {
      const gh = document.createElement("tr");
      gh.className = "ri-group-row";
      gh.innerHTML = `<td colspan="6">อำเภอ${g.amphoe}</td>`;
      tbody.appendChild(gh);
      g.ids.forEach(id => {
        const r = RESERVOIRS.find(x => x.id===id);
        if(!r) return;
        const tr = document.createElement("tr");
        tr.id = "ri-row-"+r.id;
        tr.innerHTML = `
          <td class="ri-td-no">R${String(r.no).padStart(2,"0")}</td>
          <td class="ri-td-name">
            <div class="ri-name-main">${r.name}</div>
            <div class="ri-name-sub">บ้าน${r.village} · อ.${r.amphoe}</div>
          </td>
          <td class="ri-td-cap">${r.capacity.toFixed(3)}<small>ล้าน ลบ.ม.</small></td>
          <td class="ri-td-inp">
            <div class="ri-vol-wrap">
              <input class="ri-vol-inp" id="ri-vol-${r.id}" type="number"
                step="0.001" min="0" max="${(r.capacity*1.05).toFixed(3)}"
                placeholder="0.000"
                oninput="window._riOnInput('${r.id}')"
                onkeydown="if(event.key==='Enter'){event.preventDefault();window._riNextFocus('${r.id}');}"/>
              <span class="ri-vol-unit">Mm³</span>
            </div>
          </td>
          <td class="ri-td-pct">
            <div class="ri-pct-row">
              <div class="ri-pct-bar-out"><div class="ri-pct-bar-in" id="ri-bar-${r.id}"></div></div>
              <span class="ri-pct-lbl" id="ri-pct-${r.id}">—</span>
            </div>
          </td>
          <td class="ri-td-st"><span class="ri-badge" id="ri-st-${r.id}">—</span></td>
        `;
        tbody.appendChild(tr);
      });
    });
    // Set today
    const di = document.getElementById("riDate");
    if(di && !di.value) di.value = new Date().toISOString().slice(0,10);
  }

  /* onInput */
  window._riOnInput = function(id) {
    const r   = RESERVOIRS.find(x => x.id===id);
    const inp = document.getElementById("ri-vol-"+id);
    const raw = inp.value.trim();
    const vol = parseFloat(raw);
    const row = document.getElementById("ri-row-"+id);
    inp.classList.remove("ri-has","ri-over");
    row.classList.remove("ri-filled","ri-over");
    vals[id] = undefined;
    if(raw===""||isNaN(vol)||vol<0){
      document.getElementById("ri-bar-"+id).style.width="0%";
      document.getElementById("ri-bar-"+id).style.background="#e2e8f0";
      document.getElementById("ri-pct-"+id).textContent="—";
      document.getElementById("ri-pct-"+id).style.color="#94a3b8";
      document.getElementById("ri-st-"+id).className="ri-badge";
      document.getElementById("ri-st-"+id).textContent="—";
      _riUpdateMeta(); return;
    }
    const pct = Math.round((vol/r.capacity)*100);
    vals[id] = vol;
    // style
    if(vol>r.capacity){ inp.classList.add("ri-over"); row.classList.add("ri-over"); }
    else              { inp.classList.add("ri-has");  row.classList.add("ri-filled"); }
    const c = pct>=80?"#2563eb":pct>=40?"#0d9488":pct>=20?"#f59e0b":"#dc2626";
    document.getElementById("ri-bar-"+id).style.width=Math.min(pct,100)+"%";
    document.getElementById("ri-bar-"+id).style.background=c;
    document.getElementById("ri-pct-"+id).textContent=pct+"%";
    document.getElementById("ri-pct-"+id).style.color=c;
    const st = document.getElementById("ri-st-"+id);
    if(pct>=80){st.className="ri-badge ri-st-full";st.textContent="💧 สูง";}
    else if(pct>=40){st.className="ri-badge ri-st-normal";st.textContent="🟢 ปกติ";}
    else if(pct>=20){st.className="ri-badge ri-st-warn";st.textContent="🟡 น้อย";}
    else{st.className="ri-badge ri-st-crit";st.textContent="🔴 ต่ำมาก";}
    _riUpdateMeta();
  };

  /* Jump to next on Enter */
  window._riNextFocus = function(id) {
    const ids = RESERVOIRS.map(r=>r.id);
    const i   = ids.indexOf(id);
    if(i<ids.length-1){ const next = document.getElementById("ri-vol-"+ids[i+1]); if(next) next.focus(); }
  };

  /* Update meta bar */
  function _riUpdateMeta() {
    const filled = RESERVOIRS.filter(r=>vals[r.id]!==undefined).length;
    const pct    = Math.round((filled/RESERVOIRS.length)*100);
    const el = document.getElementById("riFilledCount"); if(el) el.textContent=filled;
    const pb = document.getElementById("riProgress");    if(pb) pb.style.width=pct+"%";
    if(filled>0){
      let tv=0,tc=0;
      RESERVOIRS.forEach(r=>{ if(vals[r.id]!==undefined){tv+=vals[r.id];tc+=r.capacity;} });
      const avg=tc>0?Math.round((tv/tc)*100):0;
      const el2=document.getElementById("riAvgPct"); if(el2) el2.textContent=avg+"%";
    } else {
      const el2=document.getElementById("riAvgPct"); if(el2) el2.textContent="—";
    }
  }

  /* Clear */
  window.riClear = function() {
    if(!confirm("ล้างข้อมูลที่กรอกทั้งหมด?")) return;
    RESERVOIRS.forEach(r=>{ vals[r.id]=undefined; const inp=document.getElementById("ri-vol-"+r.id); if(inp) inp.value=""; window._riOnInput(r.id); });
  };

  /* Save */
  window.riSave = async function() {
    const date     = (document.getElementById("riDate")?.value     || "").trim();
    const recorder = (document.getElementById("riRecorder")?.value || "").trim();
    const toast    = document.getElementById("riToast");
    const btn      = document.getElementById("riBtnSave");

    const entries = RESERVOIRS.filter(r=>vals[r.id]!==undefined)
      .map(r=>({ action:"savereservoir", reservoir_id:r.id, reservoir_name:r.name, amphoe:r.amphoe, date, current_volume:vals[r.id], capacity:r.capacity, recorder }));

    function showToast(msg, type) {
      toast.className="ri-toast "+type; toast.textContent=msg; toast.style.display="inline-flex";
      setTimeout(()=>{toast.style.display="none";},5000);
    }

    if(!entries.length){ showToast("⚠️ ยังไม่ได้กรอกข้อมูล","err"); return; }
    if(!date)           { showToast("⚠️ กรุณาระบุวันที่","err"); return; }
    if(!recorder)       { showToast("⚠️ กรุณาระบุชื่อผู้บันทึก","err"); return; }

    // ถ้าไม่มี API_URL ให้แจ้ง demo
    const apiUrl = (typeof API_URL !== "undefined") ? API_URL : "";
    if(!apiUrl){
      showToast(`✅ บันทึกแล้ว ${entries.length} อ่าง (demo — ตั้งค่า API_URL ก่อน)`,"ok");
      return;
    }

    btn.disabled=true; btn.textContent="⏳ กำลังบันทึก...";
    let ok=0, fail=0;
    for(const e of entries){
      try{
        const r=await fetch(apiUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(e)});
        const d=await r.json();
        if(d.ok) ok++; else fail++;
      }catch(e){fail++;}
    }
    btn.disabled=false; btn.textContent="💾 บันทึกข้อมูลอ่างเก็บน้ำ";
    if(fail===0) showToast(`✅ บันทึกสำเร็จ ${ok} อ่าง`,"ok");
    else         showToast(`⚠️ สำเร็จ ${ok} / ล้มเหลว ${fail}`,"err");
  };

  /* Init */
  if(document.readyState==="loading")
    document.addEventListener("DOMContentLoaded", buildTable);
  else
    buildTable();
})();
</script>
